spring:
  config:
    activate:
      on-profile: prod

jwks:
  active-kid: ${JWKS_ACTIVE_KID}
  previous-kid: ${JWKS_PREVIOUS_KID:}
  key-store:
    active-private-key: ${JWKS_ACTIVE_PRIVATE_KEY_PATH}
    previous-private-key: ${JWKS_PREVIOUS_PRIVATE_KEY_PATH:}

auth:
  events:
    dev-allow-empty-secret: false
  dev:
    allow-local-jwks-client-assertions: false
  sms:
    storage: redis
    phone-hash-pepper: ${AUTH_SMS_PHONE_HASH_PEPPER}
    aliyun:
      access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
      access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
      sign-name: ${ALIYUN_SMS_SIGN_NAME}
      template-code: ${ALIYUN_SMS_TEMPLATE_CODE}
      valid-minutes: ${ALIYUN_SMS_TEMPLATE_VALID_MINUTES:5}
      endpoint: ${ALIYUN_SMS_ENDPOINT:dypnsapi.aliyuncs.com}
      region: ${ALIYUN_SMS_REGION:cn-hangzhou}
      scheme-name: ${ALIYUN_SMS_SCHEME_NAME:}
