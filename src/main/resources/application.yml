server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: auth-gateway
  profiles:
    active: dev
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5433/authdb}
    username: ${AUTH_DB_USERNAME:auth}
    password: ${AUTH_DB_PASSWORD:auth_dev_password}

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

jwks:
  active-kid: ${JWKS_ACTIVE_KID:auth-active}
  previous-kid: ${JWKS_PREVIOUS_KID:auth-previous}
  key-store:
    active-private-key: ${JWKS_ACTIVE_PRIVATE_KEY_PATH:config/keys/auth-active.pem}
    previous-private-key: ${JWKS_PREVIOUS_PRIVATE_KEY_PATH:config/keys/auth-previous.pem}

auth:
  issuer: ${AUTH_ISSUER:https://auth.careermate.cn}
  token-endpoint-audience: ${AUTH_TOKEN_ENDPOINT_AUDIENCE:https://auth.careermate.cn/oauth/token}
  access-token-ttl-seconds: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:900}
  refresh-token-ttl-seconds: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:604800}
  exchange-token-ttl-seconds: ${AUTH_EXCHANGE_TOKEN_TTL_SECONDS:600}
  sms:
    storage: memory
    phone-hash-pepper: ${AUTH_SMS_PHONE_HASH_PEPPER:auth-gateway-dev-pepper}
    code-ttl-seconds: 300
    mock-code: "123456"
