server:
  port: 8090

spring:
  application:
    name: auth-gateway
  profiles:
    active: dev

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

jwks:
  active-kid: auth-active
  previous-kid: auth-previous
  key-store:
    active-private-key: config/keys/auth-active.pem
    previous-private-key: config/keys/auth-previous.pem
